<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhishGuard</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">🛡️ PhishGuard</div>
      <div class="status-badge" id="global-status">Active</div>
    </div>
    
    <div class="main-content">
      <h2 id="current-url">Analyzing URL...</h2>
      
      <div class="risk-card loading" id="risk-card">
        <div class="risk-score">
          <span id="score-value">--</span><span class="score-percent">%</span>
        </div>
        <div class="risk-label" id="risk-label">Awaiting Analysis</div>
      </div>
      
      <div class="details">
        <div class="detail-item">
          <span class="detail-icon">🌐</span>
          <span class="detail-text" id="domain-text">Domain: --</span>
        </div>
        <div class="detail-item">
          <span class="detail-icon">🔒</span>
          <span class="detail-text" id="ssl-text">SSL: --</span>
        </div>
        <div class="detail-item">
          <span class="detail-icon">🔍</span>
          <span class="detail-text" id="vt-text" style="color: #94a3b8;">VirusTotal: --</span>
        </div>
      </div>
      
      <button class="action-btn" id="dashboard-btn">Open Analyst Dashboard</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
